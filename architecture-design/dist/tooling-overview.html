  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>工具模块组合示例</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1e293b;
        --muted: #64748b;
        --line: #3b82f6;
        --paper: #ffffff;
        --warning-bg: #fff7ed;
        --warning-line: #fb923c;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2f7;
        color: var(--ink);
      }
      main {
        max-width: none;
        margin: 0 auto;
        padding: 32px 24px 44px;
      }
      header {
        max-width: 1120px;
        margin-bottom: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .canvas {
        overflow: auto;
        background: var(--paper);
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        box-shadow: 0 18px 55px rgba(30, 41, 59, 0.12);
      }
      .diagram {
        display: block;
        width: 100%;
        height: auto;
      }
      .node-shape {
        stroke-width: 1.6;
      }
      .node-link,
      .group-link {
        cursor: pointer;
        text-decoration: none;
      }
      .node-link:hover .node-shape,
      .node-link:focus .node-shape,
      .group-link:hover .group-shape,
      .group-link:focus .group-shape {
        stroke-width: 2.6;
      }
      .node-line {
        fill: none;
        stroke-width: 1.6;
      }
      .group-shape {
        fill: #eef2ff;
        stroke: #4f46e5;
        stroke-width: 1.8;
        stroke-dasharray: 10 7;
      }
      .group-title {
        fill: #312e81;
        font-size: 14px;
        font-weight: 800;
      }
      .group-description {
        fill: #4338ca;
        font-size: 12px;
        font-weight: 600;
      }
      .node-title {
        fill: var(--ink);
        font-size: 15px;
        font-weight: 700;
      }
      .node-description {
        fill: var(--muted);
        font-size: 12px;
      }
      .relation-line {
        fill: none;
        stroke: var(--line);
        stroke-width: 2;
      }
      .relation-hitbox {
        fill: none;
        stroke: transparent;
        stroke-width: 18;
        pointer-events: stroke;
        cursor: help;
      }
      .relation-hover-line {
        fill: none;
        stroke: #2563eb;
        stroke-width: 3;
        opacity: 0;
        pointer-events: none;
      }
      .relation-hover:hover .relation-hover-line {
        opacity: 0.75;
      }
      .relation-bubble {
        opacity: 0;
        transition: opacity 120ms ease;
        pointer-events: none;
      }
      .relation-hover:hover .relation-bubble {
        opacity: 1;
      }
      .relation-bubble-box {
        fill: #ffffff;
        stroke: #94a3b8;
        stroke-width: 1;
      }
      .relation-bubble-text {
        fill: #0f172a;
        font-size: 12px;
        font-weight: 650;
        pointer-events: none;
      }
      .arrow { fill: var(--line); }
      .warnings {
        margin-top: 18px;
        padding: 12px 14px;
        border-left: 4px solid var(--warning-line);
        background: var(--warning-bg);
        border-radius: 6px;
      }
      .warnings h2 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      .warnings ul {
        margin: 0;
        padding-left: 20px;
      }
    </style>
  </head>
